<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hospital Management System - Dashboard</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="dashboard-container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-hospital"></i>
                </div>
                <h2>MediCare</h2>
                <p>Hospital Management</p>
            </div>

            <ul class="sidebar-nav" id="sidebarNav">
                <li><a href="#" data-page="dashboard" class="nav-link active"><i class="fas fa-chart-line"></i>
                        Dashboard</a></li>
                <li><a href="#" data-page="patients" class="nav-link"><i class="fas fa-users"></i> Patients</a></li>
                <li><a href="#" data-page="doctors" class="nav-link"><i class="fas fa-user-md"></i> Doctors</a></li>
                <li><a href="#" data-page="appointments" class="nav-link"><i class="fas fa-calendar-alt"></i>
                        Appointments</a></li>
                <li><a href="#" data-page="pharmacy" class="nav-link"><i class="fas fa-pills"></i> Pharmacy</a></li>
                <li><a href="#" data-page="rooms" class="nav-link"><i class="fas fa-hospital-user"></i> Rooms</a></li>
                <li><a href="#" data-page="billing" class="nav-link"><i class="fas fa-file-invoice"></i> Billing</a></li>
                <li><a href="#" data-page="reports" class="nav-link"><i class="fas fa-chart-pie"></i> Reports</a></li>
                <li class="sidebar-logout">
                    <a href="#" id="logoutBtn" class="nav-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </li>
            </ul>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- TOPBAR -->
            <div class="topbar">
                <div class="topbar-left">
                    <h3 class="topbar-title" id="pageTitle">Dashboard</h3>
                </div>
                <div class="topbar-right">
                    <button id="toggleDarkMode" class="btn btn-sm btn-icon">
                        <i class="fas fa-moon"></i>
                    </button>
                    <div class="user-info">
                        <div class="user-avatar" id="userAvatar">A</div>
                        <div class="user-details">
                            <div class="user-name" id="userName">Admin User</div>
                            <div class="user-role" id="userRole">Administrator</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- CONTENT AREA -->
            <div class="content" id="content">
                <!-- Pages will be loaded here -->
            </div>
        </div>
    </div>

    <!-- MODAL OVERLAY -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle"></h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <!-- NOTIFICATIONS -->
    <div id="notificationContainer" class="notification-container">
    </div>

    <!-- SCRIPTS -->
    <script src="js/app.js"></script>
    <script src="js/services/dataService.js"></script>
    <script src="js/utils/validator.js"></script>
    <script src="js/components/modal.js"></script>
    <script src="js/components/topbar.js"></script>
    <script src="js/components/sidebar.js"></script>
    <script src="js/components/table.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/patients.js"></script>
    <script src="js/pages/doctors.js"></script>
    <script src="js/pages/appointments.js"></script>
    <script src="js/pages/pharmacy.js"></script>
    <script src="js/pages/rooms.js"></script>
    <script src="js/pages/billing.js"></script>
    <script src="js/pages/reports.js"></script>
    <script src="js/router.js"></script>
</body>

</html>
